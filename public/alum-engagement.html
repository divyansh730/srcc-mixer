<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alum Engagement · SRCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://drive.google.com" />
  <link rel="preconnect" href="https://lh3.googleusercontent.com" />
  <link rel="preconnect" href="https://docs.google.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.32);
      --cream: #f6e8bc;
      --body: #f5edd7;
      --dark: #090400;
      --dark-soft: #120a04;
    }
    html, body {
      min-height: 100%;
      background: radial-gradient(circle at top, #130904 0%, var(--dark) 52%, #050200 100%);
      color: var(--body);
      font-family: "Cormorant Garamond", serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.25;
      mix-blend-mode: overlay;
      z-index: 0;
    }
    .mixer-back {
      position: relative;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 30px 56px 0;
      padding: 12px 24px;
      border: 1px solid rgba(201, 168, 76, 0.15);
      background: rgba(201, 168, 76, 0.05);
      border-radius: 4px;
      text-decoration: none;
      font-family: "Cinzel", serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.7);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .mixer-back:hover {
      color: var(--gold);
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold);
      transform: translateX(-8px);
    }
    .page-wrap {
      position: relative;
      z-index: 2;
      max-width: 1280px;
      margin: 0 auto;
      padding: 6px 56px 110px;
    }
    header {
      margin: 0 0 30px;
      text-align: center;
    }
    @keyframes floatFadeUp {
      0% { opacity: 0; transform: translateY(22px); filter: blur(2px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .heading {
      font-family: "Pinyon Script", cursive;
      font-size: clamp(52px, 10vw, 92px);
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.25);
      opacity: 0;
      animation: floatFadeUp 0.95s cubic-bezier(0.16, 1, 0.3, 1) 0.12s forwards;
    }
    .description {
      margin: 30px auto 0;
      max-width: 860px;
      font-size: clamp(17px, 2.3vw, 22px);
      letter-spacing: 0.04em;
      color: rgba(246, 232, 188, 0.72);
      font-style: italic;
      text-align: center;
      opacity: 0;
      animation: floatFadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.28s forwards;
    }
    .gold-divider {
      height: 1px;
      margin: 26px 0 38px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.28) 20%, rgba(201,168,76,0.28) 80%, transparent);
    }
    .card-tools {
      display: flex;
      justify-content: flex-end;
      margin: 0 0 20px;
      position: relative;
    }
    .add-card-btn {
      border: 1px solid rgba(201, 168, 76, 0.25);
      background: rgba(201, 168, 76, 0.06);
      color: rgba(201, 168, 76, 0.9);
      font-family: "Cinzel", serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 15;
      width: 18px;
      height: 18px;
      padding: 0;
      border-radius: 50%;
      opacity: 0.08;
      border-color: rgba(201, 168, 76, 0.05);
      background: rgba(201, 168, 76, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4px;
      overflow: hidden;
      text-indent: -9999px;
    }
    .add-card-btn:hover {
      opacity: 0.15;
      border-color: rgba(201, 168, 76, 0.08);
      background: rgba(201, 168, 76, 0.03);
    }
     .alum-grid {
       display: grid;
       grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
       gap: 24px;
     }
     .alum-card {
       border: 1px solid rgba(201, 168, 76, 0.18);
       background: linear-gradient(160deg, rgba(18,10,5,0.92) 0%, rgba(8,3,1,0.94) 100%);
       box-shadow: 
         0 12px 30px rgba(0, 0, 0, 0.5),
         inset 0 1px 0 rgba(201, 168, 76, 0.08);
       border-radius: 8px;
       overflow: hidden;
       cursor: pointer;
       transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease, border-color 0.35s ease;
     }
     .alum-card:hover {
       transform: translateY(-6px) scale(1.015);
       border-color: rgba(201, 168, 76, 0.46);
       box-shadow: 
         0 22px 42px rgba(0, 0, 0, 0.62),
         0 0 34px rgba(201, 168, 76, 0.08),
         inset 0 1px 0 rgba(201, 168, 76, 0.12);
     }
     .alum-photo {
       position: relative;
       aspect-ratio: 1 / 1;
       background: radial-gradient(circle at 30% 20%, rgba(201, 168, 76, 0.12), rgba(9, 5, 2, 0.92) 50%),
                   linear-gradient(135deg, #1a0f08 0%, #0a0502 100%);
       display: flex;
       align-items: center;
       justify-content: center;
       color: rgba(246, 232, 188, 0.75);
       font-family: "Cinzel", serif;
       letter-spacing: 0.16em;
       font-size: 11px;
       text-transform: uppercase;
       border: 1px solid rgba(201, 168, 76, 0.14);
       box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
     }
     .alum-photo img {
       width: 100%;
       height: 100%;
       object-fit: cover;
       display: block;
       filter: brightness(0.92) contrast(1.05) saturate(0.85);
       transition: filter 0.35s cubic-bezier(0.16, 1, 0.3, 1);
     }
     .alum-card:hover .alum-photo img {
       filter: brightness(1) contrast(1.1) saturate(1);
     }
     .alum-photo::after {
       content: "";
       position: absolute;
       inset: 0;
       border: 1px solid rgba(201, 168, 76, 0.14);
       background: 
         linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 20%),
         linear-gradient(180deg, transparent 80%, rgba(0,0,0,0.3) 100%);
       pointer-events: none;
       border-radius: 4px;
     }
    .alum-meta {
      padding: 14px 14px 16px;
      text-align: center;
    }
    .alum-name {
      font-family: "Cinzel", serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--cream);
      text-transform: uppercase;
    }
    .alum-tag {
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 0.12em;
      font-family: "Cinzel", serif;
      color: rgba(201, 168, 76, 0.7);
      text-transform: uppercase;
    }
    .video-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(5, 3, 1, 0.84);
      backdrop-filter: blur(10px) saturate(1.1);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .video-modal.open { opacity: 1; pointer-events: auto; }
    .modal-card {
      width: min(860px, 94vw);
      background: rgba(12, 8, 4, 0.96);
      border: 1px solid rgba(201, 168, 76, 0.24);
      box-shadow: 0 28px 80px rgba(0,0,0,0.78);
      padding: 34px 30px 28px;
      text-align: center;
      position: relative;
      opacity: 0;
      transform: translateY(20px) scale(0.965);
      transition: opacity 0.42s cubic-bezier(0.16, 1, 0.3, 1), transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .video-modal.open .modal-card { opacity: 1; transform: translateY(0) scale(1); }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: 1px solid rgba(201, 168, 76, 0.24);
      background: transparent;
      color: rgba(201, 168, 76, 0.75);
      font-family: "Cinzel", serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 12px;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--cream); border-color: rgba(201, 168, 76, 0.5); }
     .modal-title {
       font-family: "Cinzel", serif;
       font-size: 18px;
       letter-spacing: 0.1em;
       color: var(--cream);
       text-transform: uppercase;
       margin-bottom: 6px;
     }
     .modal-team {
       font-family: "Cinzel", serif;
       font-size: 11px;
       letter-spacing: 0.12em;
       color: rgba(201, 168, 76, 0.7);
       text-transform: uppercase;
       margin-bottom: 18px;
     }
     .modal-copy {
       display: none;
     }
     .modal-player-wrap {
       width: 100%;
       aspect-ratio: 16 / 9;
       border: 1px solid rgba(201, 168, 76, 0.2);
       background: linear-gradient(160deg, rgba(20,12,6,0.94) 0%, rgba(9,4,1,0.96) 100%);
       display: grid;
       place-items: center;
       overflow: hidden;
       border-radius: 4px;
       box-shadow: inset 0 0 0 1px rgba(201, 168, 76, 0.08);
       position: relative;
     }
     .modal-player {
       width: 100%;
       height: 100%;
       border: 0;
       display: block;
       position: absolute;
       top: 0;
       left: 0;
       z-index: 2;
     }
     .modal-placeholder {
       font-family: "Cinzel", serif;
       font-size: 10px;
       letter-spacing: 0.18em;
       color: rgba(201, 168, 76, 0.72);
       text-transform: uppercase;
       padding: 18px;
       text-align: center;
       position: absolute;
       z-index: 1;
     }
    .modal-fallback {
      margin-top: 12px;
      display: inline-block;
      border: 1px solid rgba(201, 168, 76, 0.25);
      color: rgba(201, 168, 76, 0.9);
      text-decoration: none;
      font-family: "Cinzel", serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 12px;
    }
    .modal-fallback:hover { color: var(--cream); border-color: rgba(201,168,76,0.55); }
    .loading-pulse {
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    .manage-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 3, 1, 0.84);
      backdrop-filter: blur(9px);
      z-index: 24;
      padding: 22px;
    }
    .manage-modal.open { display: flex; }
    .manage-card {
      width: min(560px, 95vw);
      background: rgba(12, 8, 4, 0.96);
      border: 1px solid rgba(201, 168, 76, 0.24);
      box-shadow: 0 28px 80px rgba(0,0,0,0.78);
      padding: 24px 22px 20px;
    }
    .manage-title {
      font-family: "Cinzel", serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 16px;
    }
    .form-row { margin-bottom: 10px; }
    .form-input {
      width: 100%;
      border: 1px solid rgba(201, 168, 76, 0.22);
      background: rgba(201, 168, 76, 0.03);
      color: var(--body);
      font-family: "Cormorant Garamond", serif;
      font-size: 17px;
      padding: 10px;
      outline: none;
    }
    .form-input:focus { border-color: rgba(201, 168, 76, 0.55); }
    .select-wrapper {
      position: relative;
      width: 100%;
    }
    .custom-select-trigger {
      width: 100%;
      border: 1px solid rgba(201, 168, 76, 0.22);
      background: rgba(201, 168, 76, 0.03);
      color: rgba(201, 168, 76, 0.7);
      font-family: "Cormorant Garamond", serif;
      font-size: 17px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .select-wrapper.active .custom-select-trigger {
      border-color: rgba(201, 168, 76, 0.55);
      background: rgba(201, 168, 76, 0.08);
    }
    .custom-options {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(12, 8, 4, 0.96);
      border: 1px solid rgba(201, 168, 76, 0.22);
      border-top: none;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }
    .select-wrapper.active .custom-options {
      display: block;
    }
    .custom-option {
      padding: 10px;
      color: rgba(201, 168, 76, 0.7);
      font-family: "Cormorant Garamond", serif;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .custom-option:hover {
      background: rgba(201, 168, 76, 0.12);
      color: var(--cream);
    }
    .custom-option.selected {
      background: rgba(201, 168, 76, 0.15);
      color: var(--cream);
    }
    .manage-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .manage-btn {
      border: 1px solid rgba(201, 168, 76, 0.24);
      background: transparent;
      color: rgba(201, 168, 76, 0.9);
      font-family: "Cinzel", serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 10px;
      cursor: pointer;
    }
    .manage-btn:hover { color: var(--cream); border-color: rgba(201,168,76,0.55); }
    @media (max-width: 768px) {
      .mixer-back { margin: 16px 16px 0; font-size: 8px; padding: 8px 14px; letter-spacing: 0.15em; }
      .page-wrap { padding: 6px 20px 90px; }
      .description { font-size: 16px; }
      .gold-divider { margin: 24px 0 28px; }
      .alum-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .alum-name { font-size: 11px; letter-spacing: 0.08em; }
      .alum-tag { font-size: 9px; letter-spacing: 0.1em; }
      .modal-copy { font-size: 16px; }
      .modal-card { width: min(760px, 95vw); padding: 30px 18px 20px; }
    }
  </style>
</head>
<body>
  <a class="mixer-back" href="./index.html">← Back</a>
  <main class="page-wrap">
    <header>
      <h1 class="heading">Alum Engagement</h1>
      <p class="description">
        Stories, reflections, and conversations with alumni who shaped The Placement Cell journey.
      </p>
    </header>
    <div class="gold-divider"></div>
    <div class="card-tools">
      <button class="add-card-btn" id="add-card-btn" type="button">Add Alum Card</button>
    </div>
    <section class="alum-grid" id="alum-grid"></section>
  </main>

   <div class="video-modal" id="video-modal" aria-hidden="true">
     <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
       <button class="modal-close" id="modal-close" type="button">Close</button>
       <h2 class="modal-title" id="modal-title">Alum Name</h2>
       <div class="modal-team" id="modal-team">Team of YYYY-YY</div>
       <div class="modal-player-wrap" id="modal-player-wrap">
         <div class="modal-placeholder" id="modal-placeholder">Video embed will be added here</div>
          <iframe class="modal-player" id="modal-player" title="Alum engagement video" allow="autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups" style="display:none;"></iframe>
       </div>
     </div>
   </div>

  <div class="manage-modal" id="manage-modal" aria-hidden="true">
    <div class="manage-card" role="dialog" aria-modal="true" aria-labelledby="manage-title">
      <div class="manage-title" id="manage-title">Add Alum Card</div>
      <div class="form-row"><input class="form-input" id="new-photo-url" type="url" placeholder="Photo URL" /></div>
      <div class="form-row"><input class="form-input" id="new-name" type="text" placeholder="Name" /></div>
      <div class="form-row">
        <div class="select-wrapper" id="team-select">
          <div class="custom-select-trigger">
            <span id="selected-team">Select Team</span>
            <span style="font-size: 12px; color: rgba(201, 168, 76, 0.5);">▾</span>
          </div>
          <div class="custom-options" id="team-options">
            <!-- Will be populated by JS -->
          </div>
        </div>
      </div>
      <div class="form-row"><input class="form-input" id="new-video" type="url" placeholder="YouTube embed link" /></div>
      <div class="manage-actions">
        <button class="manage-btn" id="cancel-add" type="button">Cancel</button>
        <button class="manage-btn" id="save-add" type="button">Save card</button>
      </div>
    </div>
  </div>

  <script>
    const assetUrl = (path) => `${window.location.origin}/srcc-mixer/${path}`;
    
     const defaultAlums = [
        { name: "Devangee Shah", team: 2024, photo: assetUrl("Alum photos/Devangee Shah.jpeg"), videoLink: "https://youtu.be/4Kt9KKZQ9t8" },
        { name: "Manvi Shangari", team: 2021, photo: assetUrl("Alum photos/Manvi Shangari.jpeg"), videoLink: "https://youtu.be/LUhdHNyMAm8" },
        { name: "Gunn Wadhwa", team: 2023, photo: assetUrl("Alum photos/Gunn Wadhwa.jpeg"), videoLink: "https://youtu.be/S9XukYxGP2k" },
        { name: "Archit Taluka", team: 2016, photo: assetUrl("Alum photos/Archit Taluka.jpeg"), videoLink: "https://youtu.be/WQubjQlOaf4" },
        { name: "Muskan Anand", team: 2019, photo: assetUrl("Alum photos/Muskan Anand.jpeg"), videoLink: "https://youtu.be/Y7NXVlTzDbc" },
        { name: "Aakash BT", team: 2021, photo: assetUrl("Alum photos/Aakash BT.jpeg"), videoLink: "https://youtu.be/fBeuf4BhWoU" },
        { name: "Rakshan Bhat", team: 2023, photo: assetUrl("Alum photos/Rakshan Bhat.jpeg"), videoLink: "https://youtu.be/NHJf-MoMea0" },
        { name: "Naman Jain", team: 2023, photo: assetUrl("Alum photos/Naman Jain.jpeg"), videoLink: "https://youtu.be/LmP-RZaw1H0" },
        { name: "Pranava Rastogi", team: 2020, photo: assetUrl("Alum photos/Pranava Rastogi.jpeg"), videoLink: "https://youtu.be/UoBcfPkHbUI" },
        { name: "Shalu Gupta", team: 2015, photo: assetUrl("Alum photos/Shalu Gupta.jpeg"), videoLink: "https://youtu.be/xBK8-nJ1NwA" },
        { name: "Aarushi Vibu", team: 2024, photo: assetUrl("Alum photos/Aarushi Vibu.jpeg"), videoLink: "https://youtu.be/FUYrWQ39RaE" },
        { name: "Shivaye Gulati", team: 2016, photo: assetUrl("Alum photos/Shivaye Gulati.jpeg"), videoLink: "https://youtu.be/H2r-d3d0bU4" },
        { name: "Devaj Mohanpuria", team: 2024, photo: assetUrl("Alum photos/Devaj Mohanpuria.jpeg"), videoLink: "https://youtu.be/RaTW5zgkF14" }
      ];
    const STORAGE_KEY = "srcc_alum_custom_cards";
    let alums = [...defaultAlums];

     const grid = document.getElementById("alum-grid");
     const modal = document.getElementById("video-modal");
     const modalTitle = document.getElementById("modal-title");
     const modalPlayer = document.getElementById("modal-player");
     const modalPlaceholder = document.getElementById("modal-placeholder");
      const modalClose = document.getElementById("modal-close");
     const addCardBtn = document.getElementById("add-card-btn");
     const manageModal = document.getElementById("manage-modal");
     const cancelAddBtn = document.getElementById("cancel-add");
     const saveAddBtn = document.getElementById("save-add");
     const newPhotoUrlInput = document.getElementById("new-photo-url");
     const newNameInput = document.getElementById("new-name");
     const teamSelect = document.getElementById("team-select");
     const selectedTeamLabel = document.getElementById("selected-team");
     const teamOptionsContainer = document.getElementById("team-options");
     const newVideoInput = document.getElementById("new-video");
     let activeEmbedToken = 0;
     let embedTimeoutId = null;
     let selectedTeamValue = "";

     // Populate Team Dropdown
     for (let year = 2024; year >= 1995; year--) {
       const opt = document.createElement('div');
       opt.className = 'custom-option';
       const nextYear = (year + 1).toString().slice(2);
       opt.textContent = `Team of ${year}-${nextYear}`;
       opt.dataset.value = year;
       opt.onclick = (e) => {
         e.stopPropagation();
         selectedTeamValue = year;
         selectedTeamLabel.textContent = `Team of ${year}-${nextYear}`;
         selectedTeamLabel.style.color = 'rgba(201, 168, 76, 0.9)';
         teamSelect.classList.remove('active');

         document.querySelectorAll('#team-options .custom-option').forEach(el => el.classList.remove('selected'));
         opt.classList.add('selected');
       };
       teamOptionsContainer.appendChild(opt);
     }

     // Toggle Team Select
     teamSelect.querySelector('.custom-select-trigger').onclick = () => teamSelect.classList.toggle('active');
     window.onclick = (e) => {
       if (!teamSelect.contains(e.target)) teamSelect.classList.remove('active');
     };

     function toYouTubeEmbedUrl(link) {
       if (!link) return "";
       try {
         let videoId = "";
         if (link.includes("youtube.com/watch")) {
           const url = new URL(link);
           videoId = url.searchParams.get("v");
         } else if (link.includes("youtu.be/")) {
           videoId = link.split("youtu.be/")[1].split("?")[0];
         } else if (link.includes("youtube.com/embed/")) {
           videoId = link.split("/embed/")[1].split("?")[0];
         }
         if (videoId) return `https://www.youtube.com/embed/${videoId}`;
       } catch (e) {
         // Fallback: assume it's already an embed URL
         if (link.includes("youtube.com/embed/")) return link;
       }
       return "";
     }

     function resetEmbedState() {
       if (embedTimeoutId) {
         clearTimeout(embedTimeoutId);
         embedTimeoutId = null;
       }
       modalPlayer.onload = null;
       modalPlayer.onerror = null;
       modalPlayer.src = "";
       modalPlayer.classList.remove("loaded");
       modalPlaceholder.classList.remove("loading-pulse");
     }

     function showPlaceholder(text, loading = false) {
       modalPlaceholder.textContent = text;
       modalPlaceholder.style.display = "block";
       modalPlaceholder.classList.toggle("loading-pulse", loading);
     }

      function beginEmbedLoad(embedUrl, rawUrl) {
       const token = ++activeEmbedToken;
       resetEmbedState();
       showPlaceholder("Loading video...", true);

       // Set src immediately with autoplay parameter
       modalPlayer.src = `${embedUrl}?autoplay=1`;
       modalPlayer.style.display = "block";
       
       // Hide placeholder after brief delay so video is visible
       embedTimeoutId = setTimeout(() => {
         if (token !== activeEmbedToken) return;
         modalPlaceholder.style.display = "none";
         if (embedTimeoutId) clearTimeout(embedTimeoutId);
         embedTimeoutId = null;
       }, 300);
     }

    function loadCustomCards() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (Array.isArray(parsed) && parsed.length) {
          alums = [...defaultAlums, ...parsed];
        }
      } catch {
        alums = [...defaultAlums];
      }
    }

    function saveCustomCards(cards) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

     function renderCards() {
       grid.innerHTML = "";
       alums.forEach((alum) => {
         const card = document.createElement("button");
         card.type = "button";
         card.className = "alum-card";
         const nextYear = (alum.team + 1).toString().slice(2);
         card.innerHTML = `
           <div class="alum-photo">${alum.photo ? `<img src="${alum.photo}" alt="${alum.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">` : "Photo Frame"}</div>
           <div class="alum-meta">
             <div class="alum-name">${alum.name}</div>
             <div class="alum-tag">Team of ${alum.team}-${nextYear}</div>
           </div>
         `;
         card.addEventListener("click", () => openModal(alum));
         grid.appendChild(card);
       });
     }

      function openModal(alum) {
        modalTitle.textContent = alum.name;
        const nextYear = (alum.team + 1).toString().slice(2);
        document.getElementById("modal-team").textContent = `Team of ${alum.team}-${nextYear}`;
        const embedUrl = toYouTubeEmbedUrl(alum.videoLink);
        if (embedUrl) {
          beginEmbedLoad(embedUrl, alum.videoLink);
       } else {
         resetEmbedState();
         showPlaceholder("Video embed link is missing or invalid.", false);
       }
       modal.setAttribute("aria-hidden", "false");
       modal.classList.add("open");
     }

    function closeModal() {
      activeEmbedToken += 1;
      resetEmbedState();
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    function openManageModal() {
      const password = prompt("Enter password to add a card:");
      if (password === "srcc1996") {
        manageModal.classList.add("open");
        manageModal.setAttribute("aria-hidden", "false");
        newNameInput.focus();
      } else if (password !== null) {
        alert("Invalid password. Access denied.");
      }
    }

     function closeManageModal() {
       manageModal.classList.remove("open");
       manageModal.setAttribute("aria-hidden", "true");
       newPhotoUrlInput.value = "";
       newNameInput.value = "";
       selectedTeamValue = "";
       selectedTeamLabel.textContent = "Select Team";
       selectedTeamLabel.style.color = "rgba(201, 168, 76, 0.7)";
       newVideoInput.value = "";
     }

     function addCustomCard() {
       const photo = newPhotoUrlInput.value.trim();
       const name = newNameInput.value.trim();
       const team = selectedTeamValue;
       const videoLink = newVideoInput.value.trim();
       if (!name || !team || !videoLink) {
         alert("Please fill in all fields");
         return;
       }

       const custom = { name, team, photo, videoLink };
       const customCards = alums.slice(defaultAlums.length);
       customCards.push(custom);
       saveCustomCards(customCards);
       loadCustomCards();
       renderCards();
       closeManageModal();
     }

    loadCustomCards();
    renderCards();

    modalClose.addEventListener("click", closeModal);
    addCardBtn.addEventListener("click", openManageModal);
    cancelAddBtn.addEventListener("click", closeManageModal);
    saveAddBtn.addEventListener("click", addCustomCard);

    manageModal.addEventListener("click", (event) => {
      if (event.target === manageModal) closeManageModal();
    });
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
