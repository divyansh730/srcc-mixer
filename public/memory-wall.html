<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Wall · SRCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #D4AF37;
      --gold-light: #E8CC6A;
      --gold-dim: rgba(212, 175, 55, 0.2);
      --cream: #F5EDD7;
      --dark: #0A0805;
      --brick-brown: #1a0f07;
      --brick-black: #050402;
      --brick-line: rgba(212, 175, 55, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--brick-black);
      /* ── Enhanced Brick Wall Pattern (Multi-tone Black, Brown, Gold Mix) ── */
      background-image: 
        /* Highlights and shading for 3D feel */
        linear-gradient(rgba(0,0,0,0.3) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.5) 100%),
        /* Staggered Vertical Lines */
        linear-gradient(90deg, transparent 50%, var(--brick-line) 50%, var(--brick-line) 51%, transparent 51%),
        linear-gradient(90deg, var(--brick-line) 1%, transparent 1%, transparent 50%, var(--brick-line) 50%, var(--brick-line) 51%, transparent 51%),
        /* Horizontal Lines */
        linear-gradient(0deg, var(--brick-line) 2px, transparent 2px),
        /* Noise/Texture */
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      
      background-size: 100% 100%, 160px 80px, 160px 80px, 160px 40px, 200px 200px;
      background-position: 0 0, 0 0, 80px 40px, 0 0, 0 0;
      background-color: #080402; /* Base dark brown/black */
      
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Radial overlay for lighting depth */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 0%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    header {
      padding: 80px 20px 60px;
      text-align: center;
      position: relative;
      z-index: 10;
      opacity: 0;
      animation: floatUpTitle 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatUpTitle {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wall-title {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(50px, 8vw, 90px);
      color: var(--gold-light);
      text-shadow: 0 0 35px rgba(212, 175, 55, 0.25);
      font-weight: 400;
      margin-bottom: 0;
    }

    /* ── Scattered Wall Container ── */
    #wall-container {
      position: relative;
      max-width: 1600px;
      margin: 0 auto;
      min-height: 80vh;
      padding-bottom: 250px;
      z-index: 5;
    }

    .memory-note {
      position: absolute; /* Scattered placement */
      --note-bg: #fdfaf0;
      background: var(--note-bg);
      color: #2c241a;
      width: min(300px, 80vw);
      padding: 25px;
      box-shadow: 
        3px 3px 15px rgba(0,0,0,0.4),
        inset 0 0 40px rgba(212, 175, 55, 0.05);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, z-index 0s;
      opacity: 0;
      animation: noteEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: var(--delay);
      cursor: default;
    }

    .note-style-1 { --note-bg: #fdfaf0; }
    .note-style-2 { --note-bg: #f5f0e1; }
    .note-style-3 { --note-bg: #f9f4e8; }

    @keyframes noteEntrance {
      from { opacity: 0; transform: translate(0, 40px) rotate(var(--rotation)) scale(0.9); }
      to { opacity: 1; transform: translate(0, 0) rotate(var(--rotation)) scale(1); }
    }

    .memory-note:hover {
      transform: translate(0, -10px) rotate(0deg) scale(1.08) !important;
      z-index: 100;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    }

    .memory-note::before {
      content: '';
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 15px;
      background: rgba(212, 175, 55, 0.12);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(212, 175, 55, 0.1);
    }

    .note-text {
      font-size: 17px;
      font-style: italic;
      margin-bottom: 20px;
      font-family: 'Cormorant Garamond', serif;
      line-height: 1.4;
    }

    .note-footer {
      border-top: 1px solid rgba(0,0,0,0.06);
      padding-top: 15px;
      display: flex;
      justify-content: flex-end;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    .note-batch {
      color: var(--gold);
      font-weight: 600;
    }

    /* ── Fixed Footer Submission Bar ── */
    #submission-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--dark) 70%, transparent);
      padding: 50px 20px;
      z-index: 200;
      display: flex;
      justify-content: center;
    }

    .etch-trigger {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 16px 45px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(5px);
    }

    .etch-trigger:hover {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.35);
      transform: translateY(-2px);
    }

    /* ── Modal Form (Mobile-style cleanup) ── */
    #etch-modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 3, 1, 0.98);
      backdrop-filter: blur(20px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #etch-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    .etch-form {
      width: min(600px, 90vw);
      position: relative;
      transform: translateY(30px);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #etch-modal.open .etch-form {
      transform: translateY(0);
    }

    .form-header h3 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 50px;
    }

    .form-group {
      margin-bottom: 40px;
      position: relative;
    }

    .form-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 15px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* Clean Mobile-style Dropdown */
    .select-wrapper {
      position: relative;
      border-bottom: 1px solid var(--gold-dim);
    }

    .etch-select {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      padding: 12px 0;
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    .select-wrapper::after {
      content: '◆';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 10px;
      pointer-events: none;
    }

    .etch-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--gold-dim);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      padding: 12px 0;
      outline: none;
      transition: border-color 0.4s ease;
    }

    .etch-input:focus {
      border-color: var(--gold);
    }

    .prompt-container {
      position: relative;
    }

    #prompt-hint {
      position: absolute;
      top: 12px; left: 0;
      font-size: 24px;
      font-style: italic;
      color: var(--cream);
      opacity: 0.25;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .etch-input:focus + #prompt-hint,
    .etch-input:not(:placeholder-shown) + #prompt-hint {
      opacity: 0 !important;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
    }

    .submit-etch {
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 14px 50px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
    }

    .close-etch {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 14px 30px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
    }

    #admin-access {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 250;
    }
    .admin-btn {
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.1);
      color: rgba(212, 175, 55, 0.3);
      padding: 8px 15px;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .memory-note {
        position: relative !important;
        left: 0 !important;
        top: 0 !important;
        margin: 20px auto;
      }
      #wall-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div id="admin-access">
    <button class="admin-btn" id="admin-trigger">Moderator</button>
  </div>

  <header>
    <h1 class="wall-title">Memory Wall</h1>
  </header>

  <main id="wall-container">
    <!-- Memories will be injected here -->
  </main>

  <div id="submission-bar">
    <button class="etch-trigger" id="open-form">Etch Your Memory</button>
  </div>

  <div id="etch-modal">
    <div class="etch-form">
      <div class="form-header">
        <h3>◆ Etch Your Legacy</h3>
      </div>

      <div class="form-group">
        <label class="form-label">Graduating Batch</label>
        <div class="select-wrapper">
          <select id="batch-select" class="etch-select" required>
            <option value="" disabled selected>Select Year</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Your Memory</label>
        <div class="prompt-container">
          <input type="text" id="memory-input" class="etch-input" placeholder=" " required autocomplete="off">
          <span id="prompt-hint">I recall...</span>
        </div>
      </div>

      <div class="form-actions">
        <button class="close-etch" id="close-form">Cancel</button>
        <button class="submit-etch" id="submit-btn">Etch It</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('etch-modal');
    const openBtn = document.getElementById('open-form');
    const closeBtn = document.getElementById('close-form');
    const batchSelect = document.getElementById('batch-select');
    const promptHint = document.getElementById('prompt-hint');
    const memoryInput = document.getElementById('memory-input');
    const wall = document.getElementById('wall-container');

    const prompts = [
      "I recall...",
      "My favorite memory is...",
      "SRCC taught me...",
      "I will never forget...",
      "Standing on the Statue Lawns...",
      "The best part was...",
      "Late nights in the library...",
      "The placement cell journey..."
    ];

    const sampleMemories = [
      { text: "The corridor discussions were more enlightening than the lectures sometimes. SRCC taught me more than just commerce.", batch: "2012" },
      { text: "I still recall the smell of the old library and the excitement of the first placement day. Truly the best years.", batch: "2005" },
      { text: "From the Statue Lawns to the corporate boardrooms, the journey has been incredible. Thank you, SRCC.", batch: "1998" },
      { text: "The Nescafe Annex was where all our business plans were born. Memories that will last a lifetime.", batch: "2018" },
      { text: "That first interview call from the Placement Cell changed everything. A legacy of excellence.", batch: "2010" },
      { text: "Sitting on the stairs of the auditorium, dreaming big. SRCC made those dreams real.", batch: "2021" }
    ];

    // Populate Batch Dropdown
    for (let year = 2026; year >= 1960; year--) {
      const opt = document.createElement('option');
      opt.value = year;
      opt.textContent = `Batch of ${year}`;
      batchSelect.appendChild(opt);
    }

    function scatterMemories() {
      wall.innerHTML = '';
      const isMobile = window.innerWidth <= 768;
      
      sampleMemories.forEach((m, i) => {
        const note = document.createElement('div');
        const styleNum = (i % 3) + 1;
        note.className = `memory-note note-style-${styleNum}`;
        
        const rotation = (Math.random() * 8 - 4).toFixed(1); // Slightly more rotation
        const delay = (i * 0.1).toFixed(1);
        
        note.style.setProperty('--rotation', `${rotation}deg`);
        note.style.setProperty('--delay', `${delay}s`);
        
        if (!isMobile) {
          // Large vertical spacing: roughly 450px apart
          // Alternating sides for a balanced yet scattered look
          const side = i % 2 === 0 ? 'left' : 'right';
          const horizontalOffset = 5 + (Math.random() * 15); // 5% to 20% from the edge
          const verticalOffset = 100 + (i * 450) + (Math.random() * 100); 
          
          if (side === 'left') {
            note.style.left = `${horizontalOffset}%`;
          } else {
            note.style.right = `${horizontalOffset}%`;
          }
          note.style.top = `${verticalOffset}px`;
        }

        note.innerHTML = `
          <p class="note-text">"${m.text}"</p>
          <div class="note-footer">
            <span class="note-batch">Batch of ${m.batch}</span>
          </div>
        `;
        wall.appendChild(note);
      });

      // Update container height to fit all scattered notes
      if (!isMobile) {
        const totalHeight = 200 + (sampleMemories.length * 450) + 400;
        wall.style.height = `${totalHeight}px`;
      } else {
        wall.style.height = 'auto';
      }
    }

    scatterMemories();
    window.addEventListener('resize', scatterMemories);

    // Modal & Prompt Logic
    openBtn.addEventListener('click', () => {
      const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
      promptHint.textContent = randomPrompt;
      promptHint.style.opacity = 0.25;
      memoryInput.value = '';
      modal.classList.add('open');
    });

    closeBtn.addEventListener('click', () => modal.classList.remove('open'));

    // Admin Placeholder
    document.getElementById('admin-trigger').addEventListener('click', () => {
      const pw = prompt("Enter Moderator Password:");
      if (pw === 'srcc2026') alert("Moderator mode enabled.");
    });

  </script>
</body>
</html>
