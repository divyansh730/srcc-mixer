<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Placement Cell · Gallery · SRCC</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A84C;
    --gold-light: #E8CC6A;
    --gold-dim:   rgba(201, 168, 76, 0.35);
    --gold-glow:  rgba(201, 168, 76, 0.12);
    --cream:      #F6E8BC;
    --cream-body: #F5EDD7;
    --dark:       #0A0500;
    --dark-3:     #181410;
  }

  html, body {
    background: var(--dark);
    min-height: 100vh;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--cream-body);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: overlay;
  }

  /* ── BACK (mixer site) ── */
  .mixer-back {
    position: relative;
    z-index: 12;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 20px 56px 0;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(201, 168, 76, 0.55);
    text-decoration: none;
    transition: color 0.25s ease, letter-spacing 0.25s ease;
  }
  .mixer-back:hover { color: var(--gold); letter-spacing: 0.26em; }

  /* ── HEADER (reference layout: eyebrow + The + Gallery + subtitle) ── */
  header {
    position: relative;
    z-index: 10;
    padding: 36px 56px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    border-bottom: 1px solid rgba(201, 168, 76, 0.14);
    background: linear-gradient(to bottom, rgba(10,6,2,0.97) 0%, transparent 100%);
  }

  @keyframes heroEntrance {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes titleEntrance {
    from { opacity: 0; transform: translateY(88px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-width: 960px;
  }

  .gh-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: clamp(8px, 0.95vw, 11px);
    letter-spacing: 0.32em;
    color: rgba(201, 168, 76, 0.52);
    text-transform: uppercase;
    opacity: 0;
    animation: heroEntrance 1s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 0.3s;
  }

  .gh-title-row {
    display: flex;
    flex-direction: row;
    align-items: baseline;
    justify-content: center;
    gap: 0.28em;
    flex-wrap: wrap;
    margin-top: 18px;
    margin-bottom: 4px;
    opacity: 0;
    animation: titleEntrance 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 0.4s;
  }

  .gh-the {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 7vw, 78px);
    font-weight: 400;
    color: #F6E8BC;
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.22), 0 4px 24px rgba(0,0,0,0.85);
  }

  .gh-gallery {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(44px, 7.5vw, 86px);
    font-weight: 400;
    color: #C9A84C;
    line-height: 1;
    text-shadow: 0 0 48px rgba(201, 168, 76, 0.35), 0 4px 28px rgba(0,0,0,0.92);
  }

  .gh-eyebrow-bottom {
    font-family: 'Cinzel', serif;
    font-size: clamp(8px, 0.9vw, 11px);
    letter-spacing: 0.2em;
    color: rgba(201, 168, 76, 0.48);
    text-transform: uppercase;
    margin-top: 14px;
  }

  .header-right {
    position: absolute;
    top: 24px;
    right: 40px;
  }

  #owner-badge {
    display: none;
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--gold);
    border: 0.5px solid var(--gold-dim);
    padding: 4px 12px;
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .mixer-back { margin: 16px 20px 0; }
    header { padding: 28px 20px 32px; }
    .header-right { top: 16px; right: 16px; }
    .gold-divider { padding: 0 20px !important; }
    #owner-login-wrap { padding: 0 20px !important; }
    .toolbar { padding: 0 20px !important; }
    .grid { padding: 0 20px 56px !important; gap: 20px !important; }
  }

  /* ── GOLD RULE ── */
  .gold-divider {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 56px;
    margin: 28px 0;
  }

  .gold-divider::before, .gold-divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .gold-divider span {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.3em;
    opacity: 0.6;
  }

  /* ── OWNER LOGIN LINK ── */
  #owner-login-wrap {
    position: relative;
    z-index: 10;
    text-align: right;
    padding: 0 56px;
    margin-bottom: 8px;
  }

  #owner-login-link {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(212,175,55,0.55);
    cursor: pointer;
    background: none;
    border: none;
    transition: color 0.2s;
    text-transform: uppercase;
  }

  #owner-login-link:hover { color: var(--gold); }

  /* ── TOOLBAR (owner only) ── */
  .toolbar {
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto 28px;
    padding: 0 56px;
    display: none;
    align-items: center;
    gap: 12px;
  }

  .toolbar.visible { display: flex; }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(212, 175, 55, 0.55);
    background: transparent;
    border: 0.5px solid rgba(212, 175, 55, 0.2);
    padding: 8px 20px;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s, background 0.25s, box-shadow 0.25s;
    text-transform: uppercase;
  }

  .btn:hover {
    color: var(--gold);
    border-color: var(--gold-dim);
    background: rgba(212, 175, 55, 0.05);
    box-shadow: 0 0 12px rgba(212, 175, 55, 0.08);
  }

  .btn-danger:hover {
    color: #c84040;
    border-color: rgba(200, 64, 64, 0.3);
    background: rgba(200, 64, 64, 0.04);
    box-shadow: none;
  }

  .btn-muted { margin-left: auto; opacity: 0.5; font-size: 8px; }

  /* ── LOADING ── */
  #loading {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(212,175,55,0.3);
  }

  /* ── GRID ── */
  .grid {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 28px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 56px 80px;
  }

  /* ── POLAROID ── */
  .polaroid {
    background: #f2edd8;
    padding: 7px 7px 10px;
    cursor: default;
    position: relative;
    box-shadow:
      0 2px 8px rgba(0,0,0,0.7),
      0 10px 32px rgba(0,0,0,0.6),
      0 0 0 0.5px rgba(212,175,55,0.08);
    transition: transform 0.28s cubic-bezier(.25,.8,.25,1), box-shadow 0.28s ease;
    animation: fadeUp 0.5s ease both;
  }

  .polaroid::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.01) 3px, rgba(0,0,0,0.01) 4px);
    pointer-events: none;
  }

  .polaroid::after {
    content: '';
    position: absolute;
    top: -0.5px; left: -0.5px;
    width: 14px; height: 14px;
    border-top: 1px solid rgba(212,175,55,0.5);
    border-left: 1px solid rgba(212,175,55,0.5);
    pointer-events: none;
    transition: border-color 0.25s;
  }

  @media (hover: hover) {
    .polaroid:hover { z-index: 20; }
    .polaroid:hover::after { border-color: var(--gold); }
    .polaroid:hover {
      transform: translateY(-6px) rotate(0deg) scale(1.03);
      box-shadow:
        0 4px 14px rgba(0,0,0,0.75),
        0 20px 56px rgba(0,0,0,0.7),
        0 0 0 0.5px rgba(201,168,76,0.28),
        0 0 32px rgba(201,168,76,0.12);
    }
  }

  .polaroid.has-image .photo-slot::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, transparent 45%, transparent 55%, rgba(201,168,76,0.06) 100%);
    transition: opacity 0.45s ease;
  }

  @media (hover: hover) {
    .polaroid.has-image:hover .photo-slot::before { opacity: 1; }
  }

  .polaroid:focus-visible {
    outline: 1px solid rgba(201,168,76,0.45);
    outline-offset: 4px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px) rotate(var(--tilt, 0deg)); }
    to   { opacity: 1; transform: translateY(0)     rotate(var(--tilt, 0deg)); }
  }

  /* ── PHOTO SLOT ── */
  .photo-slot {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--dark-3);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.78) contrast(1.06) brightness(0.97);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), filter 0.45s ease;
    cursor: pointer;
  }

  @media (hover: hover) {
    .polaroid.has-image:hover .photo-slot img {
      transform: scale(1.05);
      filter: saturate(0.92) contrast(1.08) brightness(1.02);
    }
  }

  @media (hover: none) {
    .polaroid.has-image:active .photo-slot img {
      transform: scale(1.02);
      filter: saturate(0.88) contrast(1.06) brightness(1);
    }
  }

  /* remove X — owner only */
  .polaroid.owner-mode.has-image:hover .photo-slot::after {
    content: '✕';
    position: absolute;
    top: 6px; right: 7px;
    font-size: 10px;
    color: rgba(245,237,215,0.55);
    font-family: 'Cinzel', serif;
    pointer-events: none;
    line-height: 1;
  }

  /* clickable in owner mode */
  .polaroid.owner-mode { cursor: pointer; }

  /* ── EMPTY SLOT ── */
  .empty-hint {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #141008 0%, #0e0b06 100%);
  }

  .plus-icon { width: 22px; height: 22px; position: relative; opacity: 0.18; }

  .plus-icon::before, .plus-icon::after {
    content: '';
    position: absolute;
    background: var(--gold);
    border-radius: 0.5px;
  }

  .plus-icon::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
  .plus-icon::after  { width: 100%; height: 1px; top: 50%; transform: translateY(-50%); }

  .slot-label {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    color: var(--gold);
    opacity: 0.18;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 20px 36px;
    border-top: 1px solid rgba(212,175,55,0.07);
    margin-top: 12px;
  }

  .footer-rule { display: flex; align-items: center; gap: 12px; opacity: 0.4; }
  .footer-rule span { font-family: 'Cinzel', serif; font-size: 8px; color: var(--gold); letter-spacing: 0.25em; }
  .footer-rule::before, .footer-rule::after { content: ''; width: 48px; height: 0.5px; background: var(--gold-dim); }

  footer p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 10px;
    color: rgba(212,175,55,0.25);
    letter-spacing: 0.18em;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,2,0,0.94);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    backdrop-filter: blur(14px) saturate(0.75);
    -webkit-backdrop-filter: blur(14px) saturate(0.75);
  }

  .lightbox.open { display: flex; animation: lbFade 0.35s ease; }

  @keyframes lbFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lightbox-frame {
    position: relative;
    background: linear-gradient(165deg, #1a1208 0%, #0d0804 100%);
    padding: 12px;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.22),
      0 0 80px rgba(201,168,76,0.08),
      0 40px 120px rgba(0,0,0,0.92);
    max-width: min(92vw, 1200px);
  }

  .lightbox-frame::before, .lightbox-frame::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.65;
    pointer-events: none;
  }

  .lightbox-frame::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .lightbox-frame::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .lightbox-frame img {
    display: block;
    max-width: 85vw;
    max-height: 78vh;
    object-fit: contain;
    filter: sepia(0.08) saturate(0.9) contrast(1.05);
  }

  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.28em;
    color: rgba(201,168,76,0.45);
    cursor: pointer;
    background: rgba(8,4,1,0.6);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 10px 16px;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    z-index: 10;
    text-transform: uppercase;
  }

  .lightbox-close:hover {
    color: var(--cream);
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.08);
  }

  /* ── AUTH MODAL ── */
  #auth-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,3,1,0.92);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  #auth-modal.open { display: flex; }

  #auth-box {
    background: rgba(10,8,5,0.98);
    border: 0.5px solid var(--gold-dim);
    padding: 48px 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    box-shadow: 0 0 80px rgba(212,175,55,0.06), 0 32px 80px rgba(0,0,0,0.8);
    min-width: 320px;
  }

  #auth-box::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 18px; height: 18px;
    border-top: 1px solid var(--gold);
    border-left: 1px solid var(--gold);
    opacity: 0.6;
  }

  #auth-box::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 18px; height: 18px;
    border-bottom: 1px solid var(--gold);
    border-right: 1px solid var(--gold);
    opacity: 0.6;
  }

  #auth-box h3 {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    font-weight: 400;
  }

  #auth-box p {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(245,237,215,0.4);
    letter-spacing: 0.08em;
    text-align: center;
  }

  #auth-input {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    background: transparent;
    border: 0.5px solid rgba(212,175,55,0.25);
    color: var(--cream);
    padding: 10px 18px;
    width: 100%;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  #auth-input:focus { border-color: var(--gold-dim); }

  #auth-error {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: #c84040;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.2s;
    min-height: 14px;
  }

  #auth-error.show { opacity: 1; }

  .auth-buttons { display: flex; gap: 10px; width: 100%; }
  .auth-buttons .btn { flex: 1; text-align: center; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--gold);
    background: rgba(10,8,5,0.95);
    border: 0.5px solid var(--gold-dim);
    padding: 10px 24px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 3000;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type=file] { display: none; }
</style>
</head>
<body>

<a class="mixer-back" id="mixer-back" href="./index.html">← Back</a>

<header>
  <div class="header-left">
    <span class="gh-eyebrow">The Placement Cell · SRCC</span>
    <div class="gh-title-row">
      <span class="gh-the">The</span>
      <span class="gh-gallery">Gallery</span>
    </div>
  </div>
  <div class="header-right">
    <div id="owner-badge">◆ OWNER MODE</div>
  </div>
</header>

<div class="gold-divider"><span>◆</span></div>

<div id="owner-login-wrap">
  <button id="owner-login-link" onclick="openAuthModal()">owner</button>
</div>

<div class="toolbar" id="toolbar">
  <button class="btn" onclick="document.getElementById('bulk-input').click()">+ Upload Multiple</button>
  <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
  <button class="btn btn-muted" onclick="exitOwnerMode()">Exit Owner Mode</button>
  <input type="file" id="bulk-input" accept="image/*" multiple onchange="bulkUpload(this)">
</div>

<div id="loading">Loading gallery…</div>
<div class="grid" id="grid" style="display:none"></div>

<footer>
  <div class="footer-rule"><span>◆</span></div>
  <p>The Placement Cell &nbsp;·&nbsp; Shri Ram College of Commerce &nbsp;·&nbsp; 30 Years of Excellence</p>
  <p style="font-size:9px; letter-spacing:0.22em; margin-top:2px; opacity:0.6;">Est. 1996 &nbsp;·&nbsp; A Century of SRCC &nbsp;·&nbsp; 1926 – 2026</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
  <div class="lightbox-frame" onclick="event.stopPropagation()">
    <img id="lightbox-img" src="" alt="">
  </div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal" onclick="closeAuthModal()">
  <div id="auth-box" onclick="event.stopPropagation()">
    <h3>Owner Access</h3>
    <p>Enter the passphrase to manage the gallery.</p>
    <input type="password" id="auth-input" placeholder="PASSPHRASE" autocomplete="off"
      onkeydown="if(event.key==='Enter') submitAuth()">
    <div id="auth-error">Incorrect passphrase.</div>
    <div class="auth-buttons">
      <button class="btn" onclick="submitAuth()">Enter</button>
      <button class="btn btn-danger" onclick="closeAuthModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  /* ── CONFIG ── change this to your desired password */
  const OWNER_PASS  = 'srcc1996';
  const TOTAL       = 49;
  const STORAGE_KEY = 'pc-gallery-photos';

  /** Bundled defaults (from MHTML export) — relative to this HTML file */
  function defaultPhotoSrc(i) {
    return 'pc-gallery-defaults/' + String(i).padStart(2, '0') + '.jpg';
  }

  let isOwner = false;
  let photos  = {}; // { slotIndex: base64DataUrl } overrides only; slots fall back to default JPEGs

  const grid       = document.getElementById('grid');
  const toolbar    = document.getElementById('toolbar');
  const ownerBadge = document.getElementById('owner-badge');
  const loading    = document.getElementById('loading');

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  /* ── LIGHTBOX ── */
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }

  /* ── AUTH ── */
  function openAuthModal() {
    if (isOwner) { exitOwnerMode(); return; }
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-error').classList.remove('show');
    document.getElementById('auth-modal').classList.add('open');
    setTimeout(() => document.getElementById('auth-input').focus(), 80);
  }

  function closeAuthModal() {
    document.getElementById('auth-modal').classList.remove('open');
  }

  function submitAuth() {
    if (document.getElementById('auth-input').value === OWNER_PASS) {
      closeAuthModal();
      enterOwnerMode();
    } else {
      document.getElementById('auth-error').classList.add('show');
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  }

  function enterOwnerMode() {
    isOwner = true;
    toolbar.classList.add('visible');
    ownerBadge.style.display = 'block';
    document.getElementById('owner-login-link').textContent = 'exit owner';
    document.querySelectorAll('.polaroid').forEach(p => p.classList.add('owner-mode'));
    showToast('Owner mode active');
  }

  function exitOwnerMode() {
    isOwner = false;
    toolbar.classList.remove('visible');
    ownerBadge.style.display = 'none';
    document.getElementById('owner-login-link').textContent = 'owner';
    document.querySelectorAll('.polaroid').forEach(p => p.classList.remove('owner-mode'));
    showToast('Viewing as guest');
  }

  /* ── STORAGE (localStorage — works in browser; MHTML archive APIs are not used) ── */
  async function saveAll() {
    try {
      const json = JSON.stringify(photos);
      if (json.length > 4e6) {
        showToast('Gallery too large for this browser — remove some photos');
        return;
      }
      localStorage.setItem(STORAGE_KEY, json);
    } catch (e) {
      console.error('Save failed', e);
      showToast('Save failed — storage full or blocked');
    }
  }

  async function loadAll() {
    photos = {};
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) photos = JSON.parse(raw) || {};
    } catch (e) {
      photos = {};
    }
  }

  /* ── RENDER ── */
  function renderPhoto(pol, src) {
    const slot = pol.querySelector('.photo-slot');
    slot.innerHTML = '';
    const img = document.createElement('img');
    img.src = src;
    slot.appendChild(img);
    pol.classList.add('has-image');

    img.addEventListener('click', ev => {
      ev.stopPropagation();
      openLightbox(src);
    });
  }

  function clearSlot(pol) {
    const i = pol.dataset.index;
    renderPhoto(pol, defaultPhotoSrc(i));
  }

  /* ── LOAD FROM FILE ── */
  function loadImage(pol, file) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      const src = e.target.result;
      photos[pol.dataset.index] = src;
      renderPhoto(pol, src);
      showToast('Saving…');
      await saveAll();
      showToast('Photo saved');
    };
    reader.readAsDataURL(file);
  }

  /* ── CREATE POLAROID ── */
  function createPolaroid(i) {
    const pol = document.createElement('div');
    pol.className = 'polaroid';
    pol.dataset.index = i;

    const tilt = ((Math.random() - 0.5) * 2.4).toFixed(2);
    pol.style.setProperty('--tilt', tilt + 'deg');
    pol.style.transform = `rotate(${tilt}deg)`;
    pol.style.animationDelay = (i * 0.018) + 's';

    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.innerHTML = `<div class="empty-hint"><div class="plus-icon"></div><span class="slot-label">add photo</span></div>`;
    pol.appendChild(slot);

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.addEventListener('change', function() {
      if (this.files[0]) loadImage(pol, this.files[0]);
    });
    pol.appendChild(fileInput);

    pol.addEventListener('click', function(e) {
      if (e.target.closest('img')) return;
      if (!isOwner) {
        if (this.classList.contains('has-image')) {
          const im = this.querySelector('.photo-slot img');
          if (im && im.src) openLightbox(im.src);
        }
        return;
      }
      if (this.classList.contains('has-image')) {
        delete photos[this.dataset.index];
        clearSlot(this);
        saveAll().then(() => showToast('Photo reset to default'));
      } else {
        fileInput.click();
      }
    });

    grid.appendChild(pol);
    return pol;
  }

  /* ── BULK UPLOAD ── */
  function bulkUpload(input) {
    const files = Array.from(input.files);
    const slots = Array.from(document.querySelectorAll('.polaroid'));
    files.forEach((file, i) => { if (i < slots.length) loadImage(slots[i], file); });
    input.value = '';
  }

  /* ── CLEAR ALL ── */
  async function clearAll() {
    if (!confirm('Reset all frames to the default photographs? Custom uploads will be cleared.')) return;
    photos = {};
    document.querySelectorAll('.polaroid').forEach(pol => {
      renderPhoto(pol, defaultPhotoSrc(pol.dataset.index));
    });
    await saveAll();
    showToast('Gallery reset to defaults');
  }

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeAuthModal(); }
  });

  /* ── INIT ── */
  async function init() {
    for (let i = 0; i < TOTAL; i++) createPolaroid(i);
    await loadAll();
    document.querySelectorAll('.polaroid').forEach(pol => {
      const i = pol.dataset.index;
      const src = photos[i] || defaultPhotoSrc(i);
      renderPhoto(pol, src);
    });
    loading.style.display = 'none';
    grid.style.display = 'grid';
  }

  init();
</script>
</body>
</html>
